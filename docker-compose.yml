services:
  postgres:
    image: postgres:16
    container_name: nest-postgres
    restart: always
    ports:
      - "5454:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: url_shortgres
      POSTGRES_DB: url_shortener
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: